<body>

    <div id="site-header"></div>

    <section class="contact">
        <div class="container">
            <h2 class="section-title">Contact Us</h2>
            <p class="section-subtitle">We're here to help — reach out any time.</p>
            <div class="contact-grid">
                <div class="contact-info">

                        <i class="fas fa-map-marker-alt"></i>
                        <div>

                            <p>Kaserem Trading Centre, 200m from Kaserem-Kamu junction<br>
                               Along Kapchorwa-Mbale Highway</p>
                        </div>
                    </div>
                    <div class="contact-detail">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h4>Email</h4>
                            <p><a href="mailto:wagagai.farmerssacco@gmail.com">wagagai.farmerssacco@gmail.com</a></p>
                        </div>
                    </div>
                    <div class="contact-detail">
                        <i class="fab fa-whatsapp"></i>
                        <div>
                            <h4>WhatsApp</h4>
                            <p><a href="https://wa.me/256706751553" target="_blank" rel="noopener noreferrer">Click to chat</a></p>
                        </div>
                    </div>
                    <div class="contact-detail">
                        <i class="fas">✕</i>
                        <div>
                            <h4>X</h4>
                            <p><a href="https://x.com/WagagaiCoffee" target="_blank" rel="noopener noreferrer">@WagagaiCoffee</a></p>
                        </div>
                    </div>
                    <div class="contact-detail">
                        <i class="fas fa-phone"></i>
                        <div>
                            <h4>Call Us</h4>
                            <p><a href="tel:+256706751553">+256 706 751 553</a></p>
                        </div>
                    </div>
                </div>

                <div class="contact-map">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15955.258321645939!2d34.45!3d1.3!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1777a4b5c5c5c5c5%3A0x5c5c5c5c5c5c5c5c!2sKapchorwa!5e0!3m2!1sen!2sug!4v1234567890"

                        height="300"
